# OpenTelemetry Collector (contrib) - tek trace giris noktasi.
# Uygulamalar OTLP/HTTP (4318) ya da gRPC (4317) ile buraya gonderir,
# Collector batch'leyip Tempo'ya (OTLP gRPC) iletir.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  debug:
    verbosity: basic

service:
  telemetry:
    metrics:
      level: none          # collector'in kendi metrik sunucusunu kapat (port cakismasi olmasin)
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]
