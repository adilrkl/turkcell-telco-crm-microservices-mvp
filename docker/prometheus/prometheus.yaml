# Prometheus - host'ta calisan Spring servislerini /actuator/prometheus uzerinden scrape eder.
# Servisler HOST'ta oldugu icin hedef = host.docker.internal:<port> (Docker Desktop / host-gateway).
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: spring-services
    metrics_path: /actuator/prometheus
    # Prometheus 3.x katı content-type kontrolu; actuator surum farklarina karsi guvenli varsayilan.
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ["host.docker.internal:8761"]
        labels: { service: eureka-server }
      - targets: ["host.docker.internal:8889"]
        labels: { service: config-server }
      - targets: ["host.docker.internal:8888"]
        labels: { service: gateway-server }
      - targets: ["host.docker.internal:9000"]
        labels: { service: bff-server }
      - targets: ["host.docker.internal:8081"]
        labels: { service: identity-service }
      - targets: ["host.docker.internal:8082"]
        labels: { service: customer-service }
      - targets: ["host.docker.internal:8083"]
        labels: { service: product-catalog-service }
      - targets: ["host.docker.internal:8084"]
        labels: { service: order-service }
      - targets: ["host.docker.internal:8085"]
        labels: { service: subscription-service }
      - targets: ["host.docker.internal:8086"]
        labels: { service: usage-service }
      - targets: ["host.docker.internal:8087"]
        labels: { service: billing-service }
      - targets: ["host.docker.internal:8088"]
        labels: { service: payment-service }
      - targets: ["host.docker.internal:8089"]
        labels: { service: notification-service }
      - targets: ["host.docker.internal:8090"]
        labels: { service: ticket-service }

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
