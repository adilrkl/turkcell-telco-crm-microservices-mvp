spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: identity-service
              uri: lb://identity-service
              predicates:
                - Path=/api/auth/**,/api/identity/**
            - id: customer-service
              uri: lb://customer-service
              predicates:
                - Path=/api/customers/**
            - id: product-catalog-service
              uri: lb://product-catalog-service
              predicates:
                - Path=/api/catalog/**,/api/products/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/orders/**
            - id: subscription-service
              uri: lb://subscription-service
              predicates:
                - Path=/api/subscriptions/**
            - id: usage-service
              uri: lb://usage-service
              predicates:
                - Path=/api/usage/**
            - id: billing-service
              uri: lb://billing-service
              predicates:
                - Path=/api/billing/**,/api/invoices/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/payments/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/notifications/**
            - id: ticket-service
              uri: lb://ticket-service
              predicates:
                - Path=/api/tickets/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway

# ----------------------------------------------------------------------
# Rate limiting (edge) — docx §13: "Gateway'de Redis tabanli; user basina
# 100 req/min varsayilan." Servlet gateway'de Bucket4j + Redis (Lettuce)
# ile uygulanir (reactive RedisRateLimiter bu stack'te yok). Sayac Redis'te
# tutulur -> gateway yatay olceklendiginde limit instance'lar arasi tutarli.
#   anahtar: JWT 'sub' (varsa) -> yoksa istemci IP'si
#   asildiginda: 429 + Retry-After + X-RateLimit-* header'lari
# ----------------------------------------------------------------------
telco:
  ratelimit:
    enabled: ${RATELIMIT_ENABLED:true}
    capacity: ${RATELIMIT_CAPACITY:100}
    period: ${RATELIMIT_PERIOD:1m}
    excluded-paths: /actuator
    redis:
      host: ${RATELIMIT_REDIS_HOST:localhost}
      port: ${RATELIMIT_REDIS_PORT:6379}
      password: ${RATELIMIT_REDIS_PASSWORD:}
