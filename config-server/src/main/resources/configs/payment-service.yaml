spring:
  datasource:
    url: jdbc:postgresql://localhost:5440/payment_db
    username: ${DB_USER:payment_user}
    password: ${DB_PASS:secret}
    driver-class-name: org.postgresql.Driver
  # --- Saga participant: payment-commands tuketicisi; reply'lar saga-replies'a (StreamBridge dinamik) ---
  cloud:
    function:
      definition: paymentCommands
    stream:
      bindings:
        paymentCommands-in-0:
          destination: payment-commands
          group: payment-service-group
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
        # Outbox publish sync olmali: send() broker ack'ini bekler, hata poller'in
        # retry yoluna duser. Async'te send true donup mesaj buffer'da kaybolabilir.
        default:
          producer:
            sync: true

# --- G8 dunning retry (FR-27): basarisiz fatura tahsilatlari icin yeniden deneme plani ---
payment:
  dunning:
    # Origin (ilk basarisizlik) anindan itibaren retry offset'leri. Adet = maks retry.
    # DEMO: gozle gormek icin kisalt (orn. 10s,20s,30s).
    intervals: 24h,72h,168h
    # true → retry'lar tutardan bagimsiz onaylanir (gecici hata toparlanmasi simulasyonu).
    demo-recover-on-retry: false
    # Scheduler tarama araligi (ms). DEMO'da intervals kisaltilinca bunu da kucult.
    poll-interval-ms: 60000
