spring:
  datasource:
    url: jdbc:postgresql://localhost:5434/customer_db
    username: ${DB_USER:customer_user}
    password: ${DB_PASS:secret}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  # --- Producer: OutboxPoller (CustomerKYCApproved -> customer-events, StreamBridge
  #     dinamik) -> sync publish zorunlu. Consumer binding'i yok.
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BROKERS:localhost:9092}
        # Outbox publish sync olmali: send() broker ack'ini bekler, hata poller'in
        # retry yoluna duser. Async'te send true donup mesaj buffer'da kaybolabilir.
        default:
          producer:
            sync: true
