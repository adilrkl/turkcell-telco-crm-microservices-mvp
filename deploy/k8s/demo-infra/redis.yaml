# DEMO Redis — cache + gateway rate-limit (values.yaml REDIS_HOST=redis).
# AOF kapali, veri kalici degil: cache zaten yeniden dolar (demo tercihi).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: telco-crm
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: telco-crm-demo-infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: telco-crm-demo-infra
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: telco-crm
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: telco-crm-demo-infra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
