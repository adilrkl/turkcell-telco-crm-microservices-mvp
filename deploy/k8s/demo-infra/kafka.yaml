# ======================================================================
# DEMO Kafka — KRaft tek node (compose'daki telcocrm-kafka'nin cluster-ici esi).
#
# KRITIK FARK (compose'a gore): advertised listener "kafka:9092".
# Compose EXTERNAL listener'i "localhost:9092" advertise ediyordu — bu beyan
# pod icinden ulasilamaz (pod'da localhost = pod'un kendisi). Cluster icinde
# tek listener yeterli: client'lar da broker'in kendisi de "kafka" Service
# DNS'i uzerinden konusur (values.yaml KAFKA_BROKERS=kafka:9092 ile birebir).
#
# Veri kalici degil (topic'ler auto-create, pod yeniden dogarsa bos baslar) —
# demo icin bilincli; outbox pattern sayesinde uygulama tarafi toparlar.
# ======================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: telco-crm
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: telco-crm-demo-infra
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: telco-crm-demo-infra
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.2.0
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            # Controller ayni pod'da -> localhost dogru ve Service DNS'ine
            # acilis sirasinda bagimlilik birakmaz.
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512m -Xms256m"
          ports:
            - name: kafka
              containerPort: 9092
          readinessProbe:
            tcpSocket:
              port: kafka
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: telco-crm
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: telco-crm-demo-infra
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
      targetPort: kafka
