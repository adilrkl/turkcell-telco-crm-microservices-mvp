# Demo DB parolasi (compose ile ayni). configs/*.yaml ${DB_PASS:secret} okur.
# Faz 5: Vault / external-secrets / SealedSecrets ile degistirilecek —
# chart'a gercek sir KOYMA, values'i CI'da --set/--values ile ver.
apiVersion: v1
kind: Secret
metadata:
  name: telco-crm-db-credentials
  labels:
    {{- include "telco-crm.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_PASS: {{ .Values.dbCredentials.pass | quote }}
